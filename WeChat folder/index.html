<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Reminder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #141418;
      --border: #232328;
      --border-bright: #3a3a44;
      --accent: #c8ff00;
      --accent-dim: #8aad00;
      --text: #e8e8f0;
      --text-muted: #6b6b7a;
      --danger: #ff4d6d;
      --success: #00e5a0;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius: 10px;
    }

    html, body {
      width: 420px;
      height: 620px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      user-select: none;
    }
    ::-webkit-scrollbar { display: none; }

    /* ── TITLEBAR ── */
    #titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #titlebar .logo {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .win-btns {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 8px;
    }
    .win-btn {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .win-btn:hover { opacity: 0.75; }
    .win-btn.close { background: #ff5f57; }
    .win-btn.min   { background: #febc2e; }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      height: calc(620px - 41px);
      overflow-y: auto;
      padding: 28px 24px;
      animation: fadeIn 0.25s ease;
    }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── AUTH SCREEN ── */
    .auth-header {
      margin-bottom: 32px;
    }
    .auth-header h1 {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .auth-header h1 span { color: var(--accent); }
    .auth-header p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.18s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
      font-weight: 500;
    }

    /* ── FORM ── */
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.18s;
    }
    input:focus { border-color: var(--accent); }

    .server-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .server-row .field { flex: 1; margin: 0; }
    #testBtn {
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
    }
    #testBtn:hover { border-color: var(--border-bright); color: var(--text); }
    #serverStatus {
      font-size: 10px;
      margin-top: 6px;
      min-height: 14px;
    }
    #serverStatus.ok   { color: var(--success); }
    #serverStatus.err  { color: var(--danger); }

    .submit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.12s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .msg {
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      margin-top: 10px;
    }
    .msg.err { color: var(--danger); }
    .msg.ok  { color: var(--success); }

    /* ── APP SCREEN ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .app-header h2 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
    }
    .user-avatar {
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 800;
      color: #000;
    }
    .user-name {
      font-size: 11px;
      color: var(--text-muted);
    }
    .logout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 0 0 0 8px;
      font-family: var(--font-mono);
      transition: color 0.15s;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ── ADD EVENT ── */
    .add-event-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }
    .add-event-form h3 {
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .event-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .event-inputs .field { margin: 0; }
    .event-inputs input {
      font-size: 12px;
      padding: 9px 11px;
    }
    .title-field input { font-size: 12px; padding: 9px 11px; }

    input[type="datetime-local"] {
      width: 100%;
      padding: 9px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.18s;
      color-scheme: dark;
    }
    input[type="datetime-local"]:focus { border-color: var(--accent); }

    .add-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--border-bright);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.06em;
    }
    .add-btn:hover {
      background: rgba(200, 255, 0, 0.06);
      border-color: var(--accent);
    }

    /* ── EVENTS LIST ── */
    .events-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    #eventsList { display: flex; flex-direction: column; gap: 8px; flex: 1; }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.2s ease;
      transition: border-color 0.18s;
    }
    .event-card:hover { border-color: var(--border-bright); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }

    .event-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .event-dot.past { background: var(--text-muted); }
    .event-dot.soon { background: var(--danger); }

    .event-info { flex: 1; min-width: 0; }
    .event-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .event-time {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .event-countdown {
      font-size: 10px;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
    }
    .event-countdown.past { color: var(--text-muted); }
    .event-countdown.soon { color: var(--danger); }

    .del-btn {
      background: none;
      border: none;
      color: var(--border-bright);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .del-btn:hover { color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
  </style>
</head>
<body>

<!-- TITLEBAR -->
<div id="titlebar">
  <span class="logo">◈ Event Reminder</span>
  <div class="win-btns">
    <button class="win-btn min" onclick="window.electronAPI?.minimize()"></button>
    <button class="win-btn close" onclick="window.electronAPI?.close()"></button>
  </div>
</div>

<!-- AUTH SCREEN -->
<div class="screen active" id="authScreen">
  <div class="auth-header">
    <h1>Welcome<br/><span>Back.</span></h1>
    <p>Connect to your server, then sign in.</p>
  </div>

  <!-- Server config -->
  <div class="field" style="margin-bottom:6px;">
    <label>Server IP</label>
    <div class="server-row">
      <div class="field">
        <input type="text" id="serverIP" placeholder="192.168.1.x" />
      </div>
      <button id="testBtn" onclick="testServer()">Test</button>
    </div>
    <div id="serverStatus"></div>
  </div>

  <!-- Login / Register tabs -->
  <div class="tabs" style="margin-top:16px;">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="authUsername" autocomplete="off" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="authPassword" />
  </div>

  <button class="submit-btn" id="authBtn" onclick="submitAuth()">Sign In</button>
  <div class="msg" id="authMsg"></div>
</div>

<!-- APP SCREEN -->
<div class="screen" id="appScreen">
  <div class="app-header">
    <h2>Your Events</h2>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userNameDisplay">—</span>
      <button class="logout-btn" onclick="logout()">× out</button>
    </div>
  </div>

  <!-- Add event form -->
  <div class="add-event-form">
    <h3>+ New Event</h3>
    <div class="field title-field" style="margin-bottom:8px;">
      <input type="text" id="evtTitle" placeholder="Event title…" />
    </div>
    <div class="event-inputs">
      <div class="field">
        <input type="datetime-local" id="evtDate" />
      </div>
      <div class="field">
        <input type="text" id="evtNote" placeholder="Note (optional)" />
      </div>
    </div>
    <button class="add-btn" onclick="addEvent()">＋ Add Event</button>
  </div>

  <div class="events-label">Upcoming</div>
  <div id="eventsList">
    <div class="empty-state"><div class="icon">◌</div>No events yet.</div>
  </div>
</div>

<script>
// ── STATE ──
let serverBase = '';
let currentUser = null;
let currentUserId = null;
let currentTab = 'login';
let events = [];
let countdownInterval = null;
let heartbeatInterval = null;

// Persist server IP
const savedIP = localStorage.getItem('serverIP');
if (savedIP) document.getElementById('serverIP').value = savedIP;

// ── SERVER ──
function getBase() {
  const ip = document.getElementById('serverIP').value.trim();
  localStorage.setItem('serverIP', ip);
  return `http://${ip}:3000`;
}

async function testServer() {
  const btn = document.getElementById('testBtn');
  const status = document.getElementById('serverStatus');
  btn.textContent = '…';
  try {
    const res = await fetch(getBase() + '/', { signal: AbortSignal.timeout(4000) });
    if (res.ok) {
      status.textContent = '✓ Server reachable';
      status.className = 'ok';
    } else {
      status.textContent = `✗ HTTP ${res.status}`;
      status.className = 'err';
    }
  } catch (e) {
    status.textContent = '✗ Cannot reach server';
    status.className = 'err';
  } finally {
    btn.textContent = 'Test';
  }
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('authBtn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('authMsg').textContent = '';
}

// ── AUTH ──
async function submitAuth() {
  const btn = document.getElementById('authBtn');
  const msg = document.getElementById('authMsg');
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value;

  if (!username || !password) {
    showMsg('authMsg', 'Please fill in all fields.', 'err'); return;
  }

  btn.disabled = true;
  btn.textContent = '…';
  msg.textContent = '';

  const endpoint = currentTab === 'login' ? '/api/login' : '/api/register';

  try {
    const res = await fetch(getBase() + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      signal: AbortSignal.timeout(6000),
    });
    const data = await res.json();

    if (res.ok && data.success) {
      if (currentTab === 'register') {
        showMsg('authMsg', '✓ Account created! Signing in…', 'ok');
        setTimeout(() => submitLoginDirectly(username, password), 800);
      } else {
        onLoginSuccess(username, data.userId);
      }
    } else {
      showMsg('authMsg', data.error || 'Something went wrong.', 'err');
    }
  } catch (e) {
    showMsg('authMsg', '✗ Cannot reach server. Check the IP.', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Account';
  }
}

async function submitLoginDirectly(username, password) {
  try {
    const res = await fetch(getBase() + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok && data.success) onLoginSuccess(username, data.userId);
  } catch(e) {}
}

function onLoginSuccess(username, userId) {
  currentUser = username;
  currentUserId = userId;
  document.getElementById('userAvatar').textContent = username[0].toUpperCase();
  document.getElementById('userNameDisplay').textContent = username;
  loadEvents();
  showScreen('appScreen');
  startHeartbeat();
}

function logout() {
  if (window.electronAPI && currentUserId) {
    window.electronAPI.logout(currentUserId);
  }
  stopHeartbeat();
  currentUser = null;
  currentUserId = null;
  events = [];
  clearInterval(countdownInterval);
  document.getElementById('authUsername').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authMsg').textContent = '';
  showScreen('authScreen');
}

async function syncEvents() {
  if (!currentUserId) return;
  try {
    const res = await fetch(`${getBase()}/api/events?userId=${currentUserId}`);
    if (res.ok) {
      const serverEvents = await res.json();
      if (JSON.stringify(serverEvents) !== JSON.stringify(events)) {
        events = serverEvents;
        renderEvents();
        scheduleReminders();
        updateMiniWindow();
      }
    }
  } catch (e) {}
}

function startHeartbeat() {
  stopHeartbeat();
  if (!currentUserId) return;
  syncEvents();
  if (window.electronAPI) {
    window.electronAPI.heartbeat(currentUserId);
  }
  heartbeatInterval = setInterval(() => {
    syncEvents();
    if (window.electronAPI) {
      window.electronAPI.heartbeat(currentUserId);
    }
  }, 15000);
}

function stopHeartbeat() {
  if (heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
}

// ── EVENTS (synced with server) ──

async function loadEvents() {
  if (!currentUserId) return;
  try {
    const res = await fetch(`${getBase()}/api/events?userId=${currentUserId}`);
    if (res.ok) {
      events = await res.json();
    } else {
      events = [];
    }
  } catch (e) {
    console.error('Failed to load events', e);
    events = [];
  }
  renderEvents();
  clearInterval(countdownInterval);
  countdownInterval = setInterval(renderEvents, 30000);
  scheduleReminders();
  updateMiniWindow();
}

async function addEvent() {
  const title = document.getElementById('evtTitle').value.trim();
  const dateStr = document.getElementById('evtDate').value;
  const note = document.getElementById('evtNote').value.trim();

  if (!title || !dateStr) {
    alert('Please enter a title and date.'); return;
  }

  try {
    const res = await fetch(`${getBase()}/api/events`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: currentUserId,
        title,
        description: note,
        eventDate: dateStr
      })
    });
    const data = await res.json();
    if (data.success) {
      await loadEvents();
      document.getElementById('evtTitle').value = '';
      document.getElementById('evtDate').value = '';
      document.getElementById('evtNote').value = '';
    }
  } catch (e) {
    console.error('Failed to add event', e);
  }
}

async function deleteEvent(id) {
  try {
    const res = await fetch(`${getBase()}/api/events/${id}`, {
      method: 'DELETE'
    });
    if (res.ok) {
      await loadEvents();
    }
  } catch (e) {
    console.error('Failed to delete event', e);
  }
}

function renderEvents() {
  const list = document.getElementById('eventsList');
  if (events.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">◌</div>No events yet.</div>';
    return;
  }
  list.innerHTML = events.map(ev => {
    const now = new Date();
    const evDate = new Date(ev.eventDate);
    const diff = evDate - now;
    const past = diff < 0;
    const soon = diff > 0 && diff < 60 * 60 * 1000;

    const dotClass = past ? 'past' : soon ? 'soon' : '';
    const cdClass = past ? 'past' : soon ? 'soon' : '';
    const countdown = past
      ? 'Passed'
      : soon
        ? `In ${Math.round(diff / 60000)}m`
        : formatCountdown(diff);

    const timeLabel = evDate.toLocaleDateString('en-ZA', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });

    return `
      <div class="event-card">
        <div class="event-dot ${dotClass}"></div>
        <div class="event-info">
          <div class="event-title">${escHtml(ev.title)}</div>
          <div class="event-time">${timeLabel}${ev.description ? ' · ' + escHtml(ev.description) : ''}</div>
        </div>
        <div class="event-countdown ${cdClass}">${countdown}</div>
        <button class="del-btn" onclick="deleteEvent(${ev.id})">×</button>
      </div>`;
  }).join('');
}

function formatCountdown(ms) {
  const days = Math.floor(ms / 86400000);
  const hrs = Math.floor((ms % 86400000) / 3600000);
  const mins = Math.floor((ms % 3600000) / 60000);
  if (days > 0) return `${days}d ${hrs}h`;
  if (hrs > 0) return `${hrs}h ${mins}m`;
  return `${mins}m`;
}

function scheduleReminders() {
  events.forEach(ev => {
    if (ev.reminded) return;
    const diff = new Date(ev.eventDate) - new Date();
    if (diff > 0 && diff <= 60 * 60 * 1000) {
      ev.reminded = true;
      if (window.electronAPI) {
        window.electronAPI.showNotification(
          '⏰ ' + ev.title,
          `Happening in ${formatCountdown(diff)}!`
        );
      }
    } else if (diff > 0) {
      const reminderTime = diff - 60 * 60 * 1000;
      if (reminderTime < 24 * 60 * 60 * 1000) {
        setTimeout(() => {
          ev.reminded = true;
          if (window.electronAPI) {
            window.electronAPI.showNotification('⏰ ' + ev.title, 'Happening in 1 hour!');
          }
        }, reminderTime);
      }
    }
  });
}

// ── UTILS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function restoreWindow() {
  if (window.electronAPI) {
    window.electronAPI.maximize();
  }
}

// ── MINI WINDOW ──
function updateMiniWindow() {
  if (!window.electronAPI || !currentUser) return;
  const now = new Date();
  const upcoming = events
    ? events.filter(ev => new Date(ev.eventDate) > now)
        .sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate))
    : [];
  window.electronAPI.updateMiniEvents(upcoming[0] || null);
}

if (window.electronAPI) {
  window.electronAPI.onRequestEvents && window.electronAPI.onRequestEvents(() => {
    const now = new Date();
    const upcoming = events
      ? events.filter(ev => new Date(ev.eventDate) > now)
          .sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate))
      : [];
    return upcoming[0] || null;
  });
}
</script>
